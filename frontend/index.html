<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Mini RAG com Agno</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }
      body {
        margin: 0;
        padding: 2rem;
        background: #050816;
        color: #e5e7eb;
        display: flex;
        justify-content: center;
      }
      .container {
        width: 100%;
        max-width: 800px;
        background: rgba(15, 23, 42, 0.9);
        border-radius: 16px;
        padding: 1.75rem 2rem;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.3);
      }
      h1 {
        margin-top: 0;
        margin-bottom: 0.5rem;
        font-size: 1.7rem;
      }
      p.subtitle {
        margin-top: 0;
        margin-bottom: 1.5rem;
        color: #9ca3af;
        font-size: 0.95rem;
      }
      section {
        margin-bottom: 1.75rem;
      }
      label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 0.4rem;
      }
      input[type="file"],
      input[type="text"],
      button {
        font-family: inherit;
      }
      input[type="file"],
      input[type="text"] {
        width: 100%;
        padding: 0.55rem 0.7rem;
        border-radius: 8px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        background: rgba(15, 23, 42, 0.8);
        color: #e5e7eb;
        font-size: 0.95rem;
      }
      input[type="file"] {
        padding: 0.4rem;
      }
      input:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 1px #6366f1;
      }
      button {
        margin-top: 0.6rem;
        padding: 0.55rem 1.1rem;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #6366f1, #22d3ee);
        color: #f9fafb;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
      }
      button:hover {
        filter: brightness(1.05);
      }
      .status {
        margin-top: 0.5rem;
        font-size: 0.85rem;
        color: #a5b4fc;
        min-height: 1.2em;
      }
      .response-box {
        margin-top: 0.6rem;
        padding: 0.8rem 0.9rem;
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.4);
        font-size: 0.95rem;
        white-space: pre-wrap;
      }
      .hint {
        font-size: 0.78rem;
        color: #6b7280;
        margin-top: 0.25rem;
      }
      hr {
        border: none;
        border-top: 1px solid rgba(55, 65, 81, 0.9);
        margin: 1.25rem 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Mini RAG – PDFs com Agno</h1>
      <p class="subtitle">
        Envie um PDF, ele será indexado no LanceDB via Agno, e faça perguntas
        sobre o conteúdo.
      </p>

      <section>
        <form id="upload-form">
          <label for="pdf-file">1. Selecione um PDF</label>
          <input id="pdf-file" type="file" accept="application/pdf" />
          <button type="submit">Enviar e indexar PDF</button>
          <div id="upload-status" class="status"></div>
          <p class="hint">
            O arquivo é salvo em <code>storage/</code> no backend e indexado em
            <code>tmp/lancedb</code>.
          </p>
        </form>
      </section>

      <hr />

      <section>
        <form id="chat-form">
          <label for="question">2. Faça uma pergunta sobre o PDF</label>
          <input
            id="question"
            type="text"
            placeholder="Ex.: Sobre o que trata esse documento?"
          />
          <button type="submit">Perguntar</button>
        </form>
        <div id="chat-response" class="response-box">
          Nenhuma pergunta enviada ainda.
        </div>
      </section>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
